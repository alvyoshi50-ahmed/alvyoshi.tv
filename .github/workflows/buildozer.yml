name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo dpkg --add-architecture i386
        sudo apt-get update
        sudo apt-get install -y build-essential ccache git zlib1g-dev python3 python3-pip libstdc++6:i386 libgtk2.0-0:i386 libglu1-mesa:i386
        pip install --upgrade pip
        pip install buildozer cython

    - name: Build APK
      run: buildozer android debug

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: package
        path: bin/*.apk
